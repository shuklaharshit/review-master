name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    # The default GITHUB_TOKEN is read-only; publishing a GitHub Release needs
    # write access to repo contents (electron-builder POSTs to /releases).
    permissions:
      contents: write
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - name: Install
        run: yarn install --frozen-lockfile
      - name: Build
        run: yarn build
      - name: Package & publish to GitHub Releases
        run: yarn electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
