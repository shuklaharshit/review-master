name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - name: Install
        run: yarn install --frozen-lockfile
      - name: Typecheck
        run: yarn typecheck
      - name: Unit tests
        run: yarn test

  # The DB repository tests load the native better-sqlite3 module, which the
  # default `yarn install` (postinstall) builds for Electron's ABI. They run
  # under plain Node, so we re-fetch the Node-ABI prebuilt binary first, then
  # run them via the dedicated config. Kept in a separate job so it can't break
  # the main suite or the app's Electron build.
  test-db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - name: Install
        run: yarn install --frozen-lockfile
      - name: Rebuild better-sqlite3 for Node ABI
        run: npm rebuild better-sqlite3 --update-binary
      - name: DB tests
        run: yarn test:db
